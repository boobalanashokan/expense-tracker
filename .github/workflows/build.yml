name: Build Kanakku APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x ./kanakku-android/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: ${{ github.workspace }}/kanakku-android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanakku-debug-apk
          path: kanakku-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release (on push to main)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Kanakku APK #${{ github.run_number }}"
          body: "Auto-built APK from commit ${{ github.sha }}"
          files: kanakku-android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
